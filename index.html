<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Gestion Léo</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    font-family:'Segoe UI',sans-serif;
    margin:0;
    background:#f4f6fb;
    color:#1e293b;
}

.container{
    max-width:1200px;
    margin:auto;
    padding:30px;
}

h1{
    text-align:center;
    margin-bottom:30px;
}

/* NAV */

.nav{
    display:flex;
    justify-content:center;
    gap:20px;
    margin-bottom:30px;
}

.nav button{
    background:white;
    border:none;
    padding:10px 20px;
    border-radius:12px;
    cursor:pointer;
    font-weight:600;
    box-shadow:0 3px 10px rgba(0,0,0,0.08);
}

.nav button.active{
    background:#2563eb;
    color:white;
}

/* CARDS */

.cards{
    display:flex;
    gap:20px;
    justify-content:center;
    margin-bottom:30px;
}

.card{
    background:white;
    padding:20px;
    border-radius:16px;
    width:260px;
    text-align:center;
    box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

.card h3{
    margin:0;
    font-size:16px;
    color:#64748b;
}

.card span{
    font-size:24px;
    font-weight:700;
    display:block;
    margin-top:10px;
}

/* TABLE */

table{
    width:100%;
    border-collapse:collapse;
    background:white;
    border-radius:16px;
    overflow:hidden;
    box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

th{
    background:#f1f5f9;
    padding:12px;
}

td{
    padding:12px;
    border-top:1px solid #e2e8f0;
    text-align:center;
}

/* BUTTON */

.primaryBtn{
    background:#2563eb;
    color:white;
    border:none;
    padding:10px 18px;
    border-radius:12px;
    cursor:pointer;
    margin-bottom:20px;
}

/* SECTIONS */

.section{ display:none; }
.section.active{ display:block; }

/* MODAL */

.modal{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.4);
  justify-content:center;
  align-items:center;
}

.modalContent{
  background:white;
  padding:30px;
  border-radius:16px;
  width:350px;
  display:flex;
  flex-direction:column;
  gap:15px;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.modalContent input{
  padding:10px;
  border-radius:10px;
  border:1px solid #e2e8f0;
}

.modalButtons{
  display:flex;
  justify-content:space-between;
}

.cancelBtn{
  background:#e2e8f0;
  border:none;
  padding:8px 15px;
  border-radius:10px;
  cursor:pointer;
}

.saveBtn{
  background:#2563eb;
  color:white;
  border:none;
  padding:8px 15px;
  border-radius:10px;
  cursor:pointer;
}
</style>
</head>

<body>
<div class="container">

<h1>Gestion Léo</h1>

<div class="nav">
<button onclick="switchTab('dashboard')" id="tab-dashboard" class="active">Dashboard</button>
<button onclick="switchTab('achats')" id="tab-achats">Achats</button>
<button onclick="switchTab('commandes')" id="tab-commandes">Commandes</button>
<button onclick="switchTab('ventes')" id="tab-ventes">Ventes</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="section active">

<div class="cards">
<div class="card"><h3>Total Achats</h3><span id="countAchats">0</span></div>
<div class="card"><h3>Total Commandes</h3><span id="countCommandes">0</span></div>
<div class="card"><h3>Total Ventes</h3><span id="countVentes">0</span></div>
</div>

<canvas id="chart"></canvas>

</div>

<!-- ACHATS -->
<div id="achats" class="section">
<button class="primaryBtn" onclick="openAchatModal()">+ Achat</button>
<table>
<thead>
<tr>
<th>BL</th>
<th>Date</th>
<th>Produit</th>
<th>Achat</th>
<th>Revente prévue</th>
</tr>
</thead>
<tbody id="achatsTable"></tbody>
</table>
</div>

<!-- COMMANDES -->
<div id="commandes" class="section">
<button class="primaryBtn" onclick="alert('Commande à venir')">+ Commande</button>
<table>
<thead>
<tr>
<th>BL</th>
<th>Date</th>
<th>Nb Articles</th>
<th>Total Achat</th>
<th>Frais Livraison</th>
</tr>
</thead>
<tbody id="commandesTable"></tbody>
</table>
</div>

<!-- VENTES -->
<div id="ventes" class="section">
<h3>Système vente arrive étape 2 🚀</h3>
</div>

</div>

<!-- MODAL ACHAT -->
<div id="achatModal" class="modal">
<div class="modalContent">
<h3>Nouvel Achat</h3>
<input type="text" id="achatProduit" placeholder="Nom du produit">
<input type="number" id="achatPrix" placeholder="Prix achat (€)">
<input type="number" id="achatRevente" placeholder="Prix revente prévue (€)">
<div class="modalButtons">
<button onclick="closeAchatModal()" class="cancelBtn">Annuler</button>
<button onclick="saveAchat()" class="saveBtn">Enregistrer</button>
</div>
</div>
</div>

<script>

/* STORAGE */

let achats = JSON.parse(localStorage.getItem("achats")) || [];
let commandes = JSON.parse(localStorage.getItem("commandes")) || [];
let compteurBL = localStorage.getItem("compteurBL") || 1;

/* NAV */

function switchTab(tab){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.querySelectorAll(".nav button").forEach(b=>b.classList.remove("active"));
document.getElementById(tab).classList.add("active");
document.getElementById("tab-"+tab).classList.add("active");
}

/* BL */

function generateBL(){
let bl = "BL-" + String(compteurBL).padStart(4,"0");
compteurBL++;
localStorage.setItem("compteurBL",compteurBL);
return bl;
}

/* MODAL */

function openAchatModal(){
document.getElementById("achatModal").style.display="flex";
}

function closeAchatModal(){
document.getElementById("achatModal").style.display="none";
}

function saveAchat(){

let produit = document.getElementById("achatProduit").value;
let prixAchat = parseFloat(document.getElementById("achatPrix").value) || 0;
let prixRevente = parseFloat(document.getElementById("achatRevente").value) || 0;

if(!produit) return;

achats.push({
bl:generateBL(),
date:new Date().toISOString().split("T")[0],
produit,
prixAchat,
prixRevente
});

localStorage.setItem("achats",JSON.stringify(achats));

closeAchatModal();
render();

document.getElementById("achatProduit").value="";
document.getElementById("achatPrix").value="";
document.getElementById("achatRevente").value="";
}

/* RENDER */

function render(){

document.getElementById("countAchats").innerText = achats.length;
document.getElementById("countCommandes").innerText = commandes.length;
document.getElementById("countVentes").innerText = 0;

let achatsHTML="";
achats.forEach(a=>{
achatsHTML+=`
<tr>
<td>${a.bl}</td>
<td>${a.date}</td>
<td>${a.produit}</td>
<td>${a.prixAchat}€</td>
<td>${a.prixRevente}€</td>
</tr>`;
});
document.getElementById("achatsTable").innerHTML=achatsHTML;

updateChart();
}

/* CHART */

let ctx = document.getElementById("chart").getContext("2d");

let chart = new Chart(ctx,{
type:"line",
data:{
labels:["Total"],
datasets:[
{label:"Achats",data:[0],borderColor:"#2563eb",tension:0.3},
{label:"Commandes",data:[0],borderColor:"#16a34a",tension:0.3},
{label:"Ventes",data:[0],borderColor:"#dc2626",tension:0.3}
]
},
options:{responsive:true}
});

function updateChart(){
chart.data.datasets[0].data=[achats.length];
chart.data.datasets[1].data=[commandes.length];
chart.data.datasets[2].data=[0];
chart.update();
}

render();

</script>
</body>
</html>
