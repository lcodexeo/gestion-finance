<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Gestion Léo</title>

<style>
body{
    font-family:'Segoe UI',sans-serif;
    background:#f5f7fb;
    margin:0;
    padding:30px;
}

.container{
    max-width:1100px;
    margin:auto;
}

h1{text-align:center;}

button{
    background:#2563eb;
    color:white;
    border:none;
    padding:12px 18px;
    border-radius:12px;
    cursor:pointer;
    font-weight:600;
}

button:hover{background:#1d4ed8;}

.modal{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.4);
    justify-content:center;
    align-items:center;
}

.modal-content{
    background:white;
    width:600px;
    padding:30px;
    border-radius:20px;
}

input,select{
    width:100%;
    padding:10px;
    margin-bottom:10px;
    border-radius:10px;
    border:1px solid #d1d5db;
}

.article-box{
    border:1px solid #e5e7eb;
    padding:15px;
    border-radius:15px;
    margin-bottom:15px;
}
</style>
</head>

<body>
<div class="container">

<h1>Gestion Léo</h1>

<button onclick="ouvrirModal()">+ Commande</button>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-content">

<h2>Nouvelle commande</h2>

<label>Date</label>
<input type="date" id="date">

<label>Frais de livraison (€)</label>
<input type="number" id="fraisLivraison" value="0">

<h3>Articles</h3>

<div id="articlesContainer"></div>

<button onclick="ajouterArticle()">+ Ajouter un article</button>
<br><br>
<button onclick="enregistrerCommande()">Enregistrer la commande</button>

</div>
</div>

<script>

let commandes = JSON.parse(localStorage.getItem("commandes")) || [];

function ouvrirModal(){
document.getElementById("modal").style.display="flex";
document.getElementById("articlesContainer").innerHTML="";
ajouterArticle();
}

function ajouterArticle(){

let container=document.getElementById("articlesContainer");

let index=container.children.length;

let div=document.createElement("div");
div.className="article-box";

div.innerHTML=`
<select class="categorie">
<option value="moi">Pour moi</option>
<option value="revendre">Pour revendre</option>
</select>

<input type="text" class="marque" placeholder="Marque">

<input type="text" class="description" placeholder="Description">

<input type="number" class="achat" placeholder="Prix achat">

<input type="number" class="revente" placeholder="Prix revente">
`;

container.appendChild(div);
}

function enregistrerCommande(){

let date=document.getElementById("date").value;
let fraisLivraison=parseFloat(document.getElementById("fraisLivraison").value)||0;

let articlesDiv=document.querySelectorAll(".article-box");

let articles=[];

articlesDiv.forEach(div=>{
articles.push({
categorie:div.querySelector(".categorie").value,
marque:div.querySelector(".marque").value,
description:div.querySelector(".description").value,
achat:parseFloat(div.querySelector(".achat").value)||0,
revente:parseFloat(div.querySelector(".revente").value)||0
});
});

let fraisParArticle = fraisLivraison / articles.length;

articles.forEach(a=>{
a.achatTotal = a.achat + fraisParArticle;
a.marge = a.revente - a.achatTotal;
});

commandes.push({date,fraisLivraison,articles});

localStorage.setItem("commandes",JSON.stringify(commandes));

alert("Commande enregistrée ✅");

document.getElementById("modal").style.display="none";
}

</script>

</body>
</html>
