<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Gestion Revente Pro</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    font-family: 'Segoe UI', sans-serif;
    background:#f5f7fb;
    color:#1e293b;
    padding:30px;
}

.container{
    max-width:1100px;
    margin:auto;
}

h1{
    text-align:center;
    margin-bottom:30px;
}

.dashboard{
    display:flex;
    gap:20px;
    justify-content:center;
    margin:20px 0 30px 0;
}

.card{
    padding:20px;
    border-radius:16px;
    width:240px;
    text-align:center;
    font-size:18px;
    font-weight:600;
    box-shadow:0 4px 15px rgba(0,0,0,0.08);
}

.card span{
    font-size:20px;
    display:block;
    margin-top:5px;
}

.revenus{
    background:#e6f7f0;
    color:#059669;
}

.depenses{
    background:#fde8e8;
    color:#dc2626;
}

.solde{
    background:#e0ecff;
    color:#2563eb;
}

h3{
    margin-top:40px;
    margin-bottom:10px;
}

input,select{
    padding:10px;
    border-radius:10px;
    border:1px solid #d1d5db;
    margin:5px;
    background:white;
    min-width:140px;
}

button{
    padding:10px 14px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-weight:600;
}

.ajout{
    background:#2563eb;
    color:white;
}

.ajout:hover{
    background:#1d4ed8;
}

.supprimer{
    background:#fee2e2;
    color:#dc2626;
}

.modifier{
    background:#fef3c7;
    color:#d97706;
}

canvas{
    margin-top:30px;
    background:white;
    padding:20px;
    border-radius:16px;
    box-shadow:0 4px 15px rgba(0,0,0,0.05);
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:30px;
    background:white;
    border-radius:16px;
    overflow:hidden;
    box-shadow:0 4px 15px rgba(0,0,0,0.08);
}

th{
    background:#f1f5f9;
    padding:12px;
}

td{
    padding:12px;
    border-top:1px solid #e2e8f0;
}
    
</div>
<body>
<div class="container">
<h1>Gestion Revente Pro</h1>

<div class="dashboard">
<div class="card revenus">Revenus<br><span id="revenus">0 €</span></div>
<div class="card depenses">Dépenses<br><span id="depenses">0 €</span></div>
<div class="card solde">Bénéfice<br><span id="solde">0 €</span></div>
</div>

<h3>Ajouter produit</h3>

<input type="date" id="date">
<input type="text" id="description" placeholder="Produit">
<select id="categorie">
<option value="moi">Pour moi</option>
<option value="revendre">Pour revendre</option>
</select>
<input type="number" id="achat" placeholder="Prix achat">
<input type="number" id="revente" placeholder="Prix revente (si revendre)">
<input type="number" id="livraison" placeholder="Frais livraison">
<button class="ajout" onclick="ajouter()">Ajouter</button>

<canvas id="graphique"></canvas>

<table>
<thead>
<tr>
<th>ID</th>
<th>Date</th>
<th>Produit</th>
<th>Catégorie</th>
<th>Achat</th>
<th>Revente</th>
<th>Marge</th>
<th>Stock</th>
<th>Actions</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>

<script>

let produits = JSON.parse(localStorage.getItem("produits")) || [];
let compteurID = localStorage.getItem("compteurID") || 1;

function sauvegarder(){
localStorage.setItem("produits",JSON.stringify(produits));
localStorage.setItem("compteurID",compteurID);
}

function ajouter(){

let date=document.getElementById("date").value;
let description=document.getElementById("description").value;
let categorie=document.getElementById("categorie").value;
let achat=parseFloat(document.getElementById("achat").value)||0;
let revente=parseFloat(document.getElementById("revente").value)||0;
let livraison=parseFloat(document.getElementById("livraison").value)||0;

let marge=0;
let stock="—";

if(categorie==="revendre"){
marge=revente-(achat+livraison);
stock="En stock";
}

produits.push({
id:compteurID,
date,
description,
categorie,
achat,
revente,
livraison,
marge,
stock
});

compteurID++;
sauvegarder();
afficher();
}

function afficher(){

let tbody=document.getElementById("tableBody");
tbody.innerHTML="";

let revenus=0;
let depenses=0;

produits.forEach((p,index)=>{

depenses+=p.achat+p.livraison;

if(p.categorie==="revendre" && p.stock==="Vendu"){
revenus+=p.revente;
}

tbody.innerHTML+=`
<tr>
<td>${p.id}</td>
<td>${p.date}</td>
<td>${p.description}</td>
<td>${p.categorie}</td>
<td>${p.achat}€</td>
<td>${p.revente||"-"}€</td>
<td>${p.marge.toFixed(2)}€</td>
<td>
${p.categorie==="revendre"?
`<button onclick="toggleStock(${index})">${p.stock}</button>`:"-"}
</td>
<td>
<button class="modifier" onclick="modifier(${index})">✏</button>
<button class="supprimer" onclick="supprimer(${index})">🗑</button>
</td>
</tr>
`;
});

document.getElementById("revenus").innerText=revenus.toFixed(2)+" €";
document.getElementById("depenses").innerText=depenses.toFixed(2)+" €";
document.getElementById("solde").innerText=(revenus-depenses).toFixed(2)+" €";

mettreAJourGraphique(revenus,depenses);
}

function supprimer(index){
produits.splice(index,1);
sauvegarder();
afficher();
}

function modifier(index){
let p=produits[index];
document.getElementById("date").value=p.date;
document.getElementById("description").value=p.description;
document.getElementById("categorie").value=p.categorie;
document.getElementById("achat").value=p.achat;
document.getElementById("revente").value=p.revente;
document.getElementById("livraison").value=p.livraison;
produits.splice(index,1);
}

function toggleStock(index){
if(produits[index].stock==="En stock")
produits[index].stock="Vendu";
else
produits[index].stock="En stock";

sauvegarder();
afficher();
}

let ctx=document.getElementById("graphique").getContext("2d");
let chart=new Chart(ctx,{
type:"doughnut",data:{
labels:["Revenus","Dépenses"],
datasets:[{
label:"Montants",
data:[0,0],
backgroundColor:["#10b981","#ef4444"]
}]
}
});

function mettreAJourGraphique(r,d){
chart.data.datasets[0].data=[r,d];
chart.update();
}

afficher();

</script>

</body>
</html>
