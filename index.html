<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Gestion Léo</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:'Segoe UI',sans-serif;margin:0;background:#f4f6fb;color:#1e293b;}
.container{max-width:1200px;margin:auto;padding:30px;}
h1{text-align:center;margin-bottom:30px;}

.nav{display:flex;justify-content:center;gap:20px;margin-bottom:30px;}
.nav button{background:white;border:none;padding:10px 20px;border-radius:12px;cursor:pointer;font-weight:600;box-shadow:0 3px 10px rgba(0,0,0,0.08);}
.nav button.active{background:#2563eb;color:white;}

.section{display:none;}
.section.active{display:block;}

.primaryBtn{background:#2563eb;color:white;border:none;padding:10px 18px;border-radius:12px;cursor:pointer;margin-bottom:20px;}

table{width:100%;border-collapse:collapse;background:white;border-radius:16px;overflow:hidden;box-shadow:0 5px 20px rgba(0,0,0,0.08);}
th{background:#f1f5f9;padding:12px;}
td{padding:12px;border-top:1px solid #e2e8f0;text-align:center;}

button.small{padding:5px 10px;font-size:12px;margin:2px;}
.stock{background:#e0f2fe;}
.vendu{background:#fee2e2;}
</style>
</head>

<body>
<div class="container">

<h1>Gestion Léo</h1>

<div class="nav">
<button onclick="switchTab('achats')" id="tab-achats" class="active">Achats</button>
<button onclick="switchTab('ventes')" id="tab-ventes">Ventes</button>
</div>

<!-- ACHATS -->
<div id="achats" class="section active">
<button class="primaryBtn" onclick="ajouterAchat()">+ Achat</button>

<table>
<thead>
<tr>
<th>BL</th>
<th>Date</th>
<th>Marque</th>
<th>Description</th>
<th>Achat</th>
<th>Statut</th>
<th>Actions</th>
</tr>
</thead>
<tbody id="achatsTable"></tbody>
</table>
</div>

<!-- VENTES -->
<div id="ventes" class="section">
<h3>Nouvelle Vente</h3>

<select id="selectBL"></select>
<input type="number" id="prixVente" placeholder="Prix de vente">
<button class="primaryBtn" onclick="vendre()">Valider Vente</button>

</div>

</div>

<script>

let achats = JSON.parse(localStorage.getItem("achatsClean")) || [];
let compteurBL = localStorage.getItem("compteurBLClean") || 1;

function save(){
localStorage.setItem("achatsClean",JSON.stringify(achats));
localStorage.setItem("compteurBLClean",compteurBL);
}

function switchTab(tab){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.querySelectorAll(".nav button").forEach(b=>b.classList.remove("active"));
document.getElementById(tab).classList.add("active");
document.getElementById("tab-"+tab).classList.add("active");
updateSelect();
}

function generateBL(){
let bl="BL-"+String(compteurBL).padStart(4,"0");
compteurBL++;
save();
return bl;
}

function ajouterAchat(){

let date=new Date().toISOString().split("T")[0];
let marque=prompt("Marque ?");
if(!marque)return;

let description=prompt("Description ?");
if(!description)return;

let prix=parseFloat(prompt("Prix achat ?"))||0;

achats.push({
bl:generateBL(),
date,
marque,
description,
prix,
statut:"En stock",
prixVente:0
});

save();
render();
}

function modifier(index){

let marque=prompt("Nouvelle marque ?",achats[index].marque);
if(!marque)return;

let description=prompt("Nouvelle description ?",achats[index].description);
if(!description)return;

let prix=parseFloat(prompt("Nouveau prix ?",achats[index].prix))||0;

achats[index].marque=marque;
achats[index].description=description;
achats[index].prix=prix;

save();
render();
}

function supprimer(index){
if(confirm("Supprimer ?")){
achats.splice(index,1);
save();
render();
}
}

function updateSelect(){
let select=document.getElementById("selectBL");
if(!select)return;

select.innerHTML="";
achats.filter(a=>a.statut==="En stock").forEach(a=>{
let option=document.createElement("option");
option.value=a.bl;
option.textContent=a.bl+" - "+a.description;
select.appendChild(option);
});
}

function vendre(){

let bl=document.getElementById("selectBL").value;
let prixVente=parseFloat(document.getElementById("prixVente").value)||0;

let item=achats.find(a=>a.bl===bl);
if(!item)return;

item.statut="Vendu";
item.prixVente=prixVente;

save();
render();
alert("Vente enregistrée !");
}

function render(){

let tbody="";
achats.forEach((a,i)=>{
tbody+=`
<tr class="${a.statut==="Vendu"?"vendu":"stock"}">
<td>${a.bl}</td>
<td>${a.date}</td>
<td>${a.marque}</td>
<td>${a.description}</td>
<td>${a.prix}€</td>
<td>${a.statut}</td>
<td>
<button class="small" onclick="modifier(${i})">Modifier</button>
<button class="small" onclick="supprimer(${i})">Supprimer</button>
</td>
</tr>
`;
});
document.getElementById("achatsTable").innerHTML=tbody;
updateSelect();
}

render();

</script>
</body>
</html>
