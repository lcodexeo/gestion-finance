<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Gestion Léo</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    font-family:'Segoe UI',sans-serif;
    margin:0;
    background:#f4f6fb;
    color:#1e293b;
}
.container{
    max-width:1200px;
    margin:auto;
    padding:30px;
}
h1{
    text-align:center;
    margin-bottom:30px;
}
.nav{
    display:flex;
    justify-content:center;
    gap:20px;
    margin-bottom:30px;
}
.nav button{
    background:white;
    border:none;
    padding:10px 20px;
    border-radius:12px;
    cursor:pointer;
    font-weight:600;
    box-shadow:0 3px 10px rgba(0,0,0,0.08);
}
.nav button.active{
    background:#2563eb;
    color:white;
}
.cards{
    display:flex;
    gap:20px;
    justify-content:center;
    margin-bottom:30px;
}
.card{
    background:white;
    padding:20px;
    border-radius:16px;
    width:260px;
    text-align:center;
    box-shadow:0 5px 20px rgba(0,0,0,0.08);
}
.card h3{
    margin:0;
    font-size:16px;
    color:#64748b;
}
.card span{
    font-size:24px;
    font-weight:700;
    display:block;
    margin-top:10px;
}
table{
    width:100%;
    border-collapse:collapse;
    background:white;
    border-radius:16px;
    overflow:hidden;
    box-shadow:0 5px 20px rgba(0,0,0,0.08);
}
th{
    background:#f1f5f9;
    padding:12px;
}
td{
    padding:12px;
    border-top:1px solid #e2e8f0;
    text-align:center;
}
.primaryBtn{
    background:#2563eb;
    color:white;
    border:none;
    padding:10px 18px;
    border-radius:12px;
    cursor:pointer;
    margin-bottom:20px;
}
.section{ display:none; }
.section.active{ display:block; }
</style>
</head>

<body>
<div class="container">

<h1>Gestion Léo</h1>

<div class="nav">
<button onclick="switchTab('dashboard')" id="tab-dashboard" class="active">Dashboard</button>
<button onclick="switchTab('achats')" id="tab-achats">Achats</button>
<button onclick="switchTab('commandes')" id="tab-commandes">Commandes</button>
<button onclick="switchTab('ventes')" id="tab-ventes">Ventes</button>
</div>

<div id="dashboard" class="section active">
<div class="cards">
<div class="card">
<h3>Bénéfice Achats</h3>
<span id="benefAchats">0 €</span>
</div>
<div class="card">
<h3>Bénéfice Commandes</h3>
<span id="benefCommandes">0 €</span>
</div>
<div class="card">
<h3>Bénéfice Total</h3>
<span id="benefTotal">0 €</span>
</div>
</div>
<canvas id="chart"></canvas>
</div>

<div id="achats" class="section">
<button class="primaryBtn" onclick="ajouterAchat()">+ Achat</button>
<table>
<thead>
<tr>
<th>BL</th>
<th>Date</th>
<th>Produit</th>
<th>Achat</th>
<th>Revente prévue</th>
</tr>
</thead>
<tbody id="achatsTable"></tbody>
</table>
</div>

<div id="commandes" class="section">
<button class="primaryBtn" onclick="ajouterCommande()">+ Commande</button>
<table>
<thead>
<tr>
<th>BL</th>
<th>Date</th>
<th>Nb Articles</th>
<th>Total Achat</th>
<th>Frais Livraison</th>
</tr>
</thead>
<tbody id="commandesTable"></tbody>
</table>
</div>

<div id="ventes" class="section">
<h3>Système vente arrive bientôt 🚀</h3>
</div>

</div>

<script>

/* ===== STORAGE ===== */
let achats = JSON.parse(localStorage.getItem("achats")) || [];
let commandes = JSON.parse(localStorage.getItem("commandes")) || [];
let compteurBL = localStorage.getItem("compteurBL") || 1;

/* ===== NAVIGATION ===== */
function switchTab(tab){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.querySelectorAll(".nav button").forEach(b=>b.classList.remove("active"));
document.getElementById(tab).classList.add("active");
document.getElementById("tab-"+tab).classList.add("active");
}

/* ===== BL ===== */
function generateBL(){
let bl = "BL-" + String(compteurBL).padStart(4,"0");
compteurBL++;
localStorage.setItem("compteurBL",compteurBL);
return bl;
}

/* ===== ACHAT ===== */
function ajouterAchat(){
let produit = prompt("Nom du produit ?");
if(!produit) return;

let prixAchat = parseFloat(prompt("Prix achat ?")) || 0;
let prixRevente = parseFloat(prompt("Prix revente prévue ?")) || 0;

achats.push({
bl:generateBL(),
date:new Date().toISOString().split("T")[0],
produit,
prixAchat,
prixRevente
});

localStorage.setItem("achats",JSON.stringify(achats));
render();
}

/* ===== COMMANDE ===== */
function ajouterCommande(){
let nb = parseInt(prompt("Nombre d'articles ?")) || 0;
if(nb<=0) return;

let totalAchat=0;
for(let i=0;i<nb;i++){
let prix = parseFloat(prompt("Prix article "+(i+1)))||0;
totalAchat+=prix;
}
let frais = parseFloat(prompt("Frais livraison ?"))||0;

commandes.push({
bl:generateBL(),
date:new Date().toISOString().split("T")[0],
nb,
totalAchat,
frais
});

localStorage.setItem("commandes",JSON.stringify(commandes));
render();
}

/* ===== RENDER ===== */
function render(){

document.getElementById("achatsTable").innerHTML =
achats.map(a=>`
<tr>
<td>${a.bl}</td>
<td>${a.date}</td>
<td>${a.produit}</td>
<td>${a.prixAchat}€</td>
<td>${a.prixRevente}€</td>
</tr>`).join("");

document.getElementById("commandesTable").innerHTML =
commandes.map(c=>`
<tr>
<td>${c.bl}</td>
<td>${c.date}</td>
<td>${c.nb}</td>
<td>${c.totalAchat}€</td>
<td>${c.frais}€</td>
</tr>`).join("");

let benefAchats = achats.reduce((acc,a)=>acc+(a.prixRevente-a.prixAchat),0);
let benefTotal = benefAchats;

document.getElementById("benefAchats").innerText = benefAchats+" €";
document.getElementById("benefCommandes").innerText = "0 €";
document.getElementById("benefTotal").innerText = benefTotal+" €";

updateChart();
}

/* ===== CHART LINE ===== */
let ctx = document.getElementById("chart").getContext("2d");

let chart = new Chart(ctx,{
type:"line",
data:{
labels:["Total"],
datasets:[
{
label:"Achats",
data:[0],
borderColor:"#2563eb",
backgroundColor:"transparent",
tension:0.3
},
{
label:"Commandes",
data:[0],
borderColor:"#16a34a",
backgroundColor:"transparent",
tension:0.3
},
{
label:"Ventes",
data:[0],
borderColor:"#dc2626",
backgroundColor:"transparent",
tension:0.3
}
]
},
options:{
responsive:true,
scales:{ y:{ beginAtZero:true } }
}
});

function updateChart(){
chart.data.datasets[0].data=[achats.length];
chart.data.datasets[1].data=[commandes.length];
chart.data.datasets[2].data=[0];
chart.update();
}

render();

</script>

</body>
</html>
