<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Gestion Léo</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    font-family:'Segoe UI',sans-serif;
    margin:0;
    background:#f4f6fb;
    color:#1e293b;
}

.container{
    max-width:1200px;
    margin:auto;
    padding:30px;
}

h1{
    text-align:center;
    margin-bottom:30px;
}

.cards{
    display:flex;
    gap:20px;
    justify-content:center;
    margin-bottom:30px;
}

.card{
    background:white;
    padding:20px;
    border-radius:16px;
    width:260px;
    text-align:center;
    box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

.card h3{
    margin:0;
    font-size:16px;
    color:#64748b;
}

.card span{
    font-size:24px;
    font-weight:700;
    display:block;
    margin-top:10px;
}

.primaryBtn{
    background:#2563eb;
    color:white;
    border:none;
    padding:10px 18px;
    border-radius:12px;
    cursor:pointer;
    margin-bottom:20px;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
    border-radius:16px;
    overflow:hidden;
    box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

th{
    background:#f1f5f9;
    padding:12px;
}

td{
    padding:12px;
    border-top:1px solid #e2e8f0;
    text-align:center;
}

.stock{
    background:#e0f2fe;
}

.vendu{
    background:#fee2e2;
}

button.small{
    padding:5px 10px;
    font-size:12px;
    margin:2px;
}
</style>
</head>

<body>
<div class="container">

<h1>Gestion Léo</h1>

<div class="cards">
<div class="card">
<h3>Total Dépenses</h3>
<span id="totalDepenses">0 €</span>
</div>

<div class="card">
<h3>Total Revenus</h3>
<span id="totalRevenus">0 €</span>
</div>

<div class="card">
<h3>Bénéfice Net</h3>
<span id="beneficeNet">0 €</span>
</div>
</div>

<button class="primaryBtn" onclick="ouvrirModal()">+ Achat</button>

<table>
<thead>
<tr>
<th>BL</th>
<th>Date</th>
<th>Catégorie</th>
<th>Marque</th>
<th>Description</th>
<th>Achat</th>
<th>Frais</th>
<th>Statut</th>
<th>Actions</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>

<canvas id="chart" style="margin-top:40px;"></canvas>

</div>

<script>

let achats = JSON.parse(localStorage.getItem("achatsV2")) || [];
let compteurBL = localStorage.getItem("compteurBLV2") || 1;

function saveStorage(){
    localStorage.setItem("achatsV2",JSON.stringify(achats));
    localStorage.setItem("compteurBLV2",compteurBL);
}

function generateBL(){
    let bl = "BL-" + String(compteurBL).padStart(4,"0");
    compteurBL++;
    saveStorage();
    return bl;
}

function ouvrirModal(){
    let date = prompt("Date (YYYY-MM-DD)", new Date().toISOString().split("T")[0]);
    if(!date) return;

    let categorie = prompt("Catégorie (Pour moi / Pour revendre)");
    if(!categorie) return;

    let marque = prompt("Marque ?");
    if(!marque) return;

    let description = prompt("Description ?");
    if(!description) return;

    let prix = parseFloat(prompt("Prix achat ?")) || 0;
    let frais = parseFloat(prompt("Frais livraison ?")) || 0;

    achats.push({
        bl:generateBL(),
        date,
        categorie,
        marque,
        description,
        prix,
        frais,
        statut:"En stock",
        prixVente:0
    });

    saveStorage();
    render();
}

function vendre(index){
    let prixVente = parseFloat(prompt("Prix de vente ?")) || 0;
    achats[index].prixVente = prixVente;
    achats[index].statut = "Vendu";
    saveStorage();
    render();
}

function supprimer(index){
    if(confirm("Supprimer ?")){
        achats.splice(index,1);
        saveStorage();
        render();
    }
}

function render(){

    let tbody="";
    let totalDep=0;
    let totalRev=0;

    achats.forEach((a,i)=>{

        totalDep += a.prix + a.frais;

        if(a.statut==="Vendu"){
            totalRev += a.prixVente;
        }

        tbody+=`
        <tr class="${a.statut==="Vendu"?"vendu":"stock"}">
        <td>${a.bl}</td>
        <td>${a.date}</td>
        <td>${a.categorie}</td>
        <td>${a.marque}</td>
        <td>${a.description}</td>
        <td>${a.prix}€</td>
        <td>${a.frais}€</td>
        <td>${a.statut}</td>
        <td>
            ${a.statut==="En stock" ? `<button class="small" onclick="vendre(${i})">Vendre</button>` : ""}
            <button class="small" onclick="supprimer(${i})">Supprimer</button>
        </td>
        </tr>
        `;
    });

    document.getElementById("tableBody").innerHTML = tbody;
    document.getElementById("totalDepenses").innerText = totalDep + " €";
    document.getElementById("totalRevenus").innerText = totalRev + " €";
    document.getElementById("beneficeNet").innerText = (totalRev - totalDep) + " €";

    updateChart(totalDep,totalRev);
}

let ctx = document.getElementById("chart").getContext("2d");

let chart = new Chart(ctx,{
    type:"bar",
    data:{
        labels:["Dépenses","Revenus"],
        datasets:[{
            data:[0,0],
            backgroundColor:["#2563eb","#16a34a"]
        }]
    }
});

function updateChart(dep,rev){
    chart.data.datasets[0].data=[dep,rev];
    chart.update();
}

render();

</script>
</body>
</html>
